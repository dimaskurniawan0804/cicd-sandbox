name: Technical Documentation - PR Description Details

on:
  pull_request:
    types: [closed]

jobs:
  sync-documentation:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.body, '[docs]')
    runs-on: ubuntu-latest
    steps:
      - name: Update Index Link in Main Repo Wiki
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          git clone https://x-access-token:${{ secrets.DOCS_REPO_TOKEN }}@github.com/${{ github.repository }}.wiki.git main-wiki

          cd main-wiki

          # Create a Python script to parse and structurally update the Wiki markdown
          cat << 'EOF' > update_wiki.py
          import os

          page = "Frontend-Changes-Log.md"
          year = os.environ.get('YEAR', '2026')
          month = os.environ.get('MONTH', 'January')

          date_now = os.environ.get('DATE_NOW', '')
          pr_num = os.environ.get('PR_NUMBER', '')
          pr_title = os.environ.get('PR_TITLE', '')
          pr_url = os.environ.get('PR_URL', '#')

          link = f"- 🕒 [{date_now}] 🔗 [PR #{pr_num}]({pr_url}) : 📄 {pr_title}"

          content = []
          if os.path.exists(page):
              with open(page, "r", encoding="utf-8") as f:
                  content = f.read().splitlines()
          else:
              content = [
                  "# 📚 Frontend Changes Log",
                  "",
                  "> A historical record of frontend changes documented and categorized by **Year** and **Month**.",
                  ""
              ]

          def find_header(lines, level, title, start_idx, end_idx):
              prefix = "#" * level + " " + title
              for i in range(start_idx, end_idx):
                  if lines[i].strip() == prefix:
                      return i
              return -1

          def find_next_header_of_level_or_higher(lines, level, start_idx):
              for i in range(start_idx, len(lines)):
                  line = lines[i].strip()
                  if line.startswith("#"):
                      parts = line.split()
                      if len(parts) > 0 and set(parts[0]) == {"#"} and len(parts[0]) <= level:
                          return i
              return len(lines)

          # 1. Year (H2)
          year_title = f"📅 {year}"
          y_idx = find_header(content, 2, year_title, 0, len(content))
          if y_idx == -1:
              content.extend(["", f"## {year_title}", ""])
              y_idx = len(content) - 2
          y_end = find_next_header_of_level_or_higher(content, 2, y_idx + 1)

          # 2. Month (H3)
          month_title = f"📌 {month}"
          m_idx = find_header(content, 3, month_title, y_idx + 1, y_end)
          if m_idx == -1:
              content.insert(y_end, f"### {month_title}")
              content.insert(y_end + 1, "")
              m_idx = y_end
              y_end += 2

          # 3. Insert link
          insert_idx = m_idx + 1
          while insert_idx < len(content) and content[insert_idx].strip() == "":
              insert_idx += 1
              
          content.insert(insert_idx, link)

          with open(page, "w", encoding="utf-8") as f:
              f.write("\n".join(content) + "\n")
          EOF

          # Prepare environment variables for the Python script
          export DATE_NOW=$(date +'%Y-%m-%d')
          export YEAR=$(date +'%Y')
          export MONTH=$(date +'%B')

          # Execute the update script
          python3 update_wiki.py
          rm update_wiki.py

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Frontend-Changes-Log.md
          git commit -m "wiki: added link index for PR #${PR_NUMBER}"
          git push
