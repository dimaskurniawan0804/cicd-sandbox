# STEP 2: Memproses deskripsi PR, push ke Repo Docs, dan membuat URL tujuan
- name: Process PR Description and Push to Repo Docs
  id: docs_processor
  # Memasukkan body PR ke dalam Environment Variable agar aman dari karakter aneh/petik
  env:
    PR_BODY: ${{ github.event.pull_request.body }}
  run: |
    # 1. Mengambil data internal PR
    PR_NUMBER="${{ github.event.pull_request.number }}"
    PR_TITLE="${{ github.event.pull_request.title }}"

    # 2. Membersihkan judul PR agar aman digunakan sebagai nama file (slugify)
    SAFE_TITLE=$(echo "$PR_TITLE" | sed 's/[^a-zA-Z0-9]/_ /g' | tr -s ' ' | tr ' ' '-')
    TIMESTAMP=$(date +'%Y%m%d')
    FILE_NAME="${TIMESTAMP}-PR-${PR_NUMBER}-${SAFE_TITLE}.md"

    # 3. Clone Repo Docs Sandbox menggunakan rahasia token PAT
    git clone https://x-access-token:${{ secrets.DOCS_REPO_TOKEN }}@github.com/dimaskurniawan0804/doc-sandbox.git target-docs

    cd target-docs
    mkdir -p changes

    # 4. Menyusun konten file Markdown (.md) untuk dokumentasi
    echo "# $PR_TITLE" > "changes/$FILE_NAME"
    echo -e "\n- **Original PR:** #${PR_NUMBER}" >> "changes/$FILE_NAME"
    echo -e "- **Merged By:** @${{ github.actor }}" >> "changes/$FILE_NAME"
    echo -e "- **Date Merged:** $(date +'%Y-%m-%d %H:%M:%S')\n" >> "changes/$FILE_NAME"
    echo "---" >> "changes/$FILE_NAME"

    # Memasukkan isi deskripsi PR dengan aman memanggil variabel $PR_BODY bawaan env
    echo -e "\n$PR_BODY" >> "changes/$FILE_NAME"

    # 5. Commit dan Push file dokumen baru ke Repo Docs
    git config --global user.name "github-actions[bot]"
    git config --global user.email "github-actions[bot]@users.noreply.github.com"
    git add .
    git commit -m "docs: auto-generated change-doc for PR #${PR_NUMBER}"
    git push

    # 6. Menyimpan URL file Markdown tersebut sebagai output agar bisa dibaca step berikutnya
    FINAL_DOCS_URL="https://github.com/dimaskurniawan0804/doc-sandbox/blob/main/changes/${FILE_NAME}"
    echo "generated_url=$FINAL_DOCS_URL" >> $GITHUB_OUTPUT
