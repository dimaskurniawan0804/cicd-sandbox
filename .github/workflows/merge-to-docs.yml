name: Cross-Repo Documentation Sync

on:
  pull_request:
    types: [closed]

jobs:
  sync-documentation:
    # Perintah hanya dijalankan jika PR sukses di-merge, bukan sekadar di-close biasa
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Mengunduh source code Repo Utama ke runner GitHub Actions
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      # STEP 2: Memproses deskripsi PR, push ke Repo Docs, dan membuat URL tujuan
      - name: Process PR Description and Push to Repo Docs
        id: docs_processor
        run: |
          # 1. Mengambil data internal PR
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          # 2. Membersihkan judul PR agar aman digunakan sebagai nama file (slugify)
          SAFE_TITLE=$(echo "$PR_TITLE" | sed 's/[^a-zA-Z0-9]/_ /g' | tr -s ' ' | tr ' ' '-')
          TIMESTAMP=$(date +'%Y%m%d')
          FILE_NAME="${TIMESTAMP}-PR-${PR_NUMBER}-${SAFE_TITLE}.md"

          # 3. Clone Repo Docs menggunakan rahasia token PAT yang sudah kita buat
          # Catatan: Sesuaikan 'nama-org' dan 'repo-docs' dengan nama asli di GitHub kamu
          git clone https://x-access-token:${{ secrets.DOCS_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/repo-docs.git target-docs

          cd target-docs
          mkdir -p changes

          # 4. Menyusun konten file Markdown (.md) untuk dokumentasi
          echo "# $PR_TITLE" > "changes/$FILE_NAME"
          echo -e "\n- **Original PR:** #${PR_NUMBER}" >> "changes/$FILE_NAME"
          echo -e "- **Merged By:** @${{ github.actor }}" >> "changes/$FILE_NAME"
          echo -e "- **Date Merged:** $(date +'%Y-%m-%d %H:%M:%S')\n" >> "changes/$FILE_NAME"
          echo "---" >> "changes/$FILE_NAME"

          # Memasukkan isi deskripsi PR ke dalam file
          echo -e "\n${{ github.event.pull_request.body }}" >> "changes/$FILE_NAME"

          # 5. Commit dan Push file dokumen baru ke Repo Docs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: auto-generated change-doc for PR #${PR_NUMBER}"
          git push

          # 6. Menyimpan URL file Markdown tersebut sebagai output agar bisa dibaca step berikutnya
          # Sesuaikan URL ini dengan struktur organisasi kamu
          FINAL_DOCS_URL="https://github.com/${{ github.repository_owner }}/repo-docs/blob/main/changes/${FILE_NAME}"
          echo "generated_url=$FINAL_DOCS_URL" >> $GITHUB_OUTPUT

      # STEP 3: Mengunduh Wiki Repo Utama, lalu menambahkan link dokumen di baris paling atas
      - name: Update Index Link in Main Repo Wiki
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Mengambil output URL dari step sebelumnya
          DOCS_URL="${{ steps.docs_processor.outputs.generated_url }}"
          DATE_NOW=$(date +'%Y-%m-%d')

          # 1. Clone Wiki internal dari Repo Utama (menggunakan akhiran .wiki.git)
          git clone https://x-access-token:${{ secrets.DOCS_REPO_TOKEN }}@github.com/${{ github.repository }}.wiki.git main-wiki

          cd main-wiki

          # 2. Jika file Home.md di Wiki belum pernah ada, buat struktur dasarnya dahulu
          if [ ! -f "Home.md" ]; then
            echo "# Project Changelog Index" > Home.md
            echo -e "\nBerikut adalah daftar riwayat perubahan fitur yang berhasil di-merge:\n" >> Home.md
            echo "" >> Home.md
            echo "" >> Home.md
          fi

          # 3. Format baris link yang akan ditampilkan di Wiki
          NEW_LINK_ENTRY="- [$DATE_NOW] PR #$PR_NUMBER: [$PR_TITLE]($DOCS_URL)"

          # 4. Menyisipkan link baru tepat di bawah tag penanda # Menggunakan 'sed' agar data baru selalu berada di urutan paling atas (Terbaru)
          sed -i "//a $NEW_LINK_ENTRY" Home.md

          # 5. Commit dan Push kembali ke repositori Wiki
          git add Home.md
          git commit -m "wiki: added link index for PR #${PR_NUMBER}"
          git push
