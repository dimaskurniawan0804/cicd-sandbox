name: Cross-Repo Documentation Sync

on:
  pull_request:
    types: [closed]

jobs:
  sync-documentation:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      PLATFORM_NAME: "backoffice" # SILAKAN UBAH INI SESUAI NAMA REPO/PLATFORM (cth: "web", "bo-terminal")

    steps:
      # STEP 1: Mengunduh source code Repo Utama ke runner
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      # STEP 2: Memproses deskripsi PR, push ke Repo Docs, dan membuat URL tujuan
      - name: Process PR Description and Push to Repo Docs
        id: docs_processor
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.actor }}
        run: |
          # 1. Data PR sudah aman tersedia melalui environment variables

          # 2. Membersihkan judul PR agar aman digunakan sebagai nama file (slugify)
          SAFE_TITLE=$(echo "$PR_TITLE" | sed 's/[^a-zA-Z0-9]/-/g' | tr -s '-')
          TIMESTAMP=$(date +'%Y%m%d')
          FILE_NAME="${TIMESTAMP}-PR-${PR_NUMBER}-${SAFE_TITLE}.md"

          # Menentukan folder tujuan berdasarkan platform dan waktu (contoh: frontend-changes-logs/web/2026-june)
          YEAR=$(date +'%Y')
          MONTH_LOWER=$(date +'%B' | tr '[:upper:]' '[:lower:]')
          DOCS_FOLDER="frontend-changes-logs/${PLATFORM_NAME}/${YEAR}/${MONTH_LOWER}"

          # 3. Clone Repo Docs Sandbox menggunakan rahasia token PAT
          git clone https://x-access-token:${{ secrets.DOCS_REPO_TOKEN }}@github.com/dimaskurniawan0804/doc-sandbox.git target-docs

          cd target-docs
          mkdir -p "$DOCS_FOLDER"

          TARGET_PATH="${DOCS_FOLDER}/${FILE_NAME}"

          # 4. Menyusun konten file Markdown (.md) untuk dokumentasi
          echo "# $PR_TITLE" > "$TARGET_PATH"
          echo -e "\n- **Original PR:** #${PR_NUMBER}" >> "$TARGET_PATH"
          echo -e "- **Merged By:** @${PR_AUTHOR}" >> "$TARGET_PATH"
          echo -e "- **Date Merged:** $(date +'%Y-%m-%d %H:%M:%S')\n" >> "$TARGET_PATH"
          echo "---" >> "$TARGET_PATH"

          # Memasukkan isi deskripsi PR dengan aman melalui env variable
          echo -e "\n$PR_BODY" >> "$TARGET_PATH"

          # 5. Commit dan Push file dokumen baru ke Repo Docs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: auto-generated change-doc for PR #${PR_NUMBER} (${PLATFORM_NAME})"
          git push

          # 6. Menyimpan URL file Markdown tersebut sebagai output agar bisa dibaca step berikutnya
          FINAL_DOCS_URL="https://github.com/dimaskurniawan0804/doc-sandbox/blob/main/${TARGET_PATH}"
          echo "generated_url=$FINAL_DOCS_URL" >> $GITHUB_OUTPUT

      # STEP 3: Mengunduh Wiki Repo Utama, lalu memperbarui halaman Frontend-Changes-Log.md
      - name: Update Index Link in Main Repo Wiki
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          DOCS_URL: ${{ steps.docs_processor.outputs.generated_url }}
        run: |
          git clone https://x-access-token:${{ secrets.DOCS_REPO_TOKEN }}@github.com/${{ github.repository }}.wiki.git main-wiki

          cd main-wiki

          # Membuat script python untuk mem-parsing dan update markdown wiki secara terstruktur
          cat << 'EOF' > update_wiki.py
          import os

          page = "Frontend-Changes-Log.md"
          platform = os.environ.get('PLATFORM_NAME', 'UNKNOWN').upper()
          year = os.environ.get('YEAR', '2026')
          month = os.environ.get('MONTH', 'January')

          date_now = os.environ.get('DATE_NOW', '')
          pr_num = os.environ.get('PR_NUMBER', '')
          pr_title = os.environ.get('PR_TITLE', '')
          docs_url = os.environ.get('DOCS_URL', '')

          link = f"- [{date_now}] PR #{pr_num}: [{pr_title}]({docs_url})"

          content = []
          if os.path.exists(page):
              with open(page, "r", encoding="utf-8") as f:
                  content = f.read().splitlines()
          else:
              content = ["# Frontend Changes Log", ""]

          def find_header(lines, level, title, start_idx, end_idx):
              prefix = "#" * level + " " + title
              for i in range(start_idx, end_idx):
                  if lines[i].strip() == prefix:
                      return i
              return -1

          def find_next_header_of_level_or_higher(lines, level, start_idx):
              for i in range(start_idx, len(lines)):
                  line = lines[i].strip()
                  if line.startswith("#"):
                      parts = line.split()
                      if len(parts) > 0 and set(parts[0]) == {"#"} and len(parts[0]) <= level:
                          return i
              return len(lines)

          # 1. Platform (H2)
          p_idx = find_header(content, 2, platform, 0, len(content))
          if p_idx == -1:
              content.extend(["", f"## {platform}", ""])
              p_idx = len(content) - 2
          p_end = find_next_header_of_level_or_higher(content, 2, p_idx + 1)

          # 2. Year (H3)
          y_idx = find_header(content, 3, year, p_idx + 1, p_end)
          if y_idx == -1:
              content.insert(p_end, f"### {year}")
              content.insert(p_end + 1, "")
              y_idx = p_end
              p_end += 2
          y_end = find_next_header_of_level_or_higher(content, 3, y_idx + 1)

          # 3. Month (H4)
          m_idx = find_header(content, 4, month, y_idx + 1, y_end)
          if m_idx == -1:
              content.insert(y_end, f"#### {month}")
              content.insert(y_end + 1, "")
              m_idx = y_end
              y_end += 2

          # 4. Insert link
          insert_idx = m_idx + 1
          while insert_idx < len(content) and content[insert_idx].strip() == "":
              insert_idx += 1
              
          content.insert(insert_idx, link)

          with open(page, "w", encoding="utf-8") as f:
              f.write("\n".join(content) + "\n")
          EOF

          # Menyiapkan env vars untuk script python
          export DATE_NOW=$(date +'%Y-%m-%d')
          export YEAR=$(date +'%Y')
          export MONTH=$(date +'%B')

          # Eksekusi update
          python3 update_wiki.py
          rm update_wiki.py

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Frontend-Changes-Log.md
          git commit -m "wiki: added link index for PR #${PR_NUMBER} to ${PLATFORM_NAME}"
          git push
